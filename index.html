<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard RH - Resolução Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CONFIGURAÇÃO DE RESOLUÇÃO 100% */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; /* Proíbe qualquer barra de rolagem */
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .wrapper { display: flex; width: 100vw; height: 100vh; }

        /* BARRA LATERAL FIXA */
        .sidebar { 
            width: 250px; height: 100%; background: #1e293b; color: white; 
            padding: 15px; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 14px; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 3px; }
        .input-group input { 
            width: 100%; padding: 6px; border-radius: 4px; border: none; font-size: 12px; 
        }

        /* ÁREA DOS GRÁFICOS (OCUPA O RESTANTE) */
        .main-view { 
            flex-grow: 1; display: flex; flex-direction: column; 
            padding: 15px; gap: 15px; height: 100%; 
        }

        .header { height: 40px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; color: #1e293b; }

        .charts-row { 
            flex-grow: 1; /* Ocupa todo o espaço vertical restante */
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            min-height: 0; /* Essencial para o gráfico não estourar a tela */
        }
        
        .chart-box { 
            background: white; border-radius: 8px; padding: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; min-height: 0;
        }
        .chart-box h3 { font-size: 13px; margin-bottom: 8px; color: #64748b; }
        
        /* CONTAINER DO CANVAS - RESOLUÇÃO DINÂMICA */
        .canvas-wrapper { flex-grow: 1; position: relative; min-height: 0; }

        button { 
            background: #3b82f6; color: white; border: none; padding: 10px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="sidebar">
            <h2>⚙️ Ajustar Dados</h2>
            <div id="inputs-area"></div>
            <button onclick="update()">Atualizar Dash</button>
        </div>

        <div class="main-view">
            <div class="header">
                <h1>Painel de Desempenho RH 2025</h1>
                <span id="clock" style="color:#64748b; font-size: 12px;"></span>
            </div>

            <div class="charts-row">
                <div class="chart-box">
                    <h3>Média por Competência</h3>
                    <div class="canvas-wrapper">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
                <div class="chart-box">
                    <h3>Performance Individual</h3>
                    <div class="canvas-wrapper">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados padrão
        let staff = [
            {n: 'Colaborador A', v: 8.5},
            {n: 'Colaborador B', v: 7.2},
            {n: 'Colaborador C', v: 9.8},
            {n: 'Colaborador D', v: 6.5}
        ];

        // Gerar inputs
        const area = document.getElementById('inputs-area');
        staff.forEach((s, i) => {
            area.innerHTML += `<div class="input-group">
                <label>${s.n}</label>
