<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACRES v7 - Full History & Auto-Sum</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg-body: #f1f5f9; --sidebar: #0f172a; --primary: #6366f1; 
            --secondary: #a855f7; --success: #22c55e; --gold: #eab308; 
            --danger: #f43f5e; --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: #1e293b; overflow-x: hidden; }
        .wrapper { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 310px; background: var(--sidebar); color: white; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { font-size: 28px; font-weight: 900; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        
        .add-area { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .add-area input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: none; background: #1e293b; color: white; font-size: 11px; }
        .btn-add { width: 100%; background: linear-gradient(135deg, var(--success), #16a34a); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 11px; }

        .list-area { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; max-height: 200px; }
        .item { padding: 10px; background: rgba(255,255,255,0.03); margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; font-size: 11px; }
        .item.active { background: rgba(99, 102, 241, 0.2); border-color: var(--primary); }

        .editor { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .row label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .row input { width: 60px; padding: 5px; border-radius: 6px; border: none; background: #334155; color: white; text-align: center; font-weight: 900; }
        .row.total-row input { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        #print-container { width: 1050px; display: flex; flex-direction: column; gap: 15px; background: var(--bg-body); padding: 10px; }

        .header { background: var(--card-bg); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .badge-total { padding: 12px 25px; border-radius: 15px; color: white; font-weight: 900; font-size: 18px; }
        
        .actions { display: flex; gap: 8px; }
        .btn-action { padding: 10px 14px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; color: white; font-size: 10px; display: flex; align-items: center; gap: 5px; }
        .btn-save { background: var(--primary); }
        .btn-hist { background: var(--secondary); }
        .btn-money { background: #0f172a; }
        .btn-pdf { background: var(--danger); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 18px; border: 1px solid #e2e8f0; }
        .card h4 { font-size: 10px; font-weight: 900; color: #64748b; margin-bottom: 12px; text-transform: uppercase; }
        .full { grid-column: span 2; }
        .chart-container { height: 160px; position: relative; width: 100%; }

        /* MODAIS */
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.85); z-index:99; backdrop-filter: blur(4px); }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:20px; z-index:100; width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .hist-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f1f5f9; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" onclick="fecharModais()"></div>

<div id="modal-salary" class="modal">
    <h2 style="margin-bottom: 20px; font-weight: 900;">💰 Gestão Financeira (Bônus 40%)</h2>
    <div id="salary-list"></div>
    <button onclick="fecharModais()" style="margin-top:20px; width:100%; padding:12px; background:var(--sidebar); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:900;">FECHAR</button>
</div>

<div id="modal-history" class="modal">
    <h2 id="hist-title" style="margin-bottom: 20px; font-weight: 900;">📜 Histórico de Avaliações</h2>
    <div id="hist-content"></div>
    <button onclick="fecharModais()" style="margin-top:20px; width:100%; padding:12px; background:var(--secondary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:900;">FECHAR</button>
</div>

<div class="wrapper">
    <aside class="sidebar">
        <h2>SACRES v7</h2>
        <div class="add-area">
            <input type="text" id="new-name" placeholder="NOME DO COLABORADOR">
            <input type="text" id="new-role" placeholder="CARGO">
            <input type="number" id="new-salary" placeholder="SALÁRIO R$">
            <button class="btn-add" onclick="addGestor()">+ ADICIONAR AO SISTEMA</button>
        </div>
        <div id="list" class="list-area"></div>
        <div class="editor">
            <h4 style="color: #818cf8; font-size: 9px; margin-bottom: 10px; font-weight: 900;">NOTAS TÉCNICAS</h4>
            <div id="inputs"></div>
        </div>
    </aside>

    <main class="main">
        <div id="print-container">
            <div class="header">
                <div>
                    <h2 id="h-name" style="font-size: 20px; font-weight: 900;">Selecione um Gestor</h2>
                    <p id="h-role" style="font-weight: 700; color: var(--primary); font-size: 12px; text-transform: uppercase;"></p>
                </div>
                <div id="badge-total" class="badge-total" style="background: var(--primary)">PONTUAÇÃO: 0 / 100</div>
                <div class="actions">
                    <button class="btn-action btn-save" onclick="salvarNoHistorico()">📌 SALVAR</button>
                    <button class="btn-action btn-hist" onclick="abrirAbaHistorico()">📜 ABA HISTÓRICO</button>
                    <button class="btn-action btn-money" onclick="abrirSalario()">💰 FINANCEIRO</button>
                    <button class="btn-action btn-pdf" onclick="gerarPDF()">📄 PDF</button>
                </div>
            </div>

            <div class="grid">
                <div class="card"><h4>📊 EQUILÍBRIO COMPETÊNCIAS</h4><div class="chart-container"><canvas id="c-radar"></canvas></div></div>
                <div class="card"><h4>📈 EVOLUÇÃO TEMPORAL</h4><div class="chart-container"><canvas id="c-line"></canvas></div></div>
                <div class="card full">
                    <h4>📊 COMPARATIVO DE PERFORMANCE</h4>
                    <div class="chart-container" style="height: 140px;"><canvas id="c-comp"></canvas></div>
                    <textarea id="obs-area" placeholder="Observações de feedback..." oninput="salvarObs()"></textarea>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const categorias = ['RESULTADOS', 'GESTÃO PESSOAS', 'COMPROMETIMENTO', 'CONTRIBUIÇÃO', 'CULTURA'];
    let atual = 0;
    let gestores = JSON.parse(localStorage.getItem('sacres_v7_data')) || [
        { n: 'GESTOR EXEMPLO', r: 'GERENTE', v: [100, 25, 25, 25, 25], s: 5000, obs: "", history: [] }
    ];

    let radar, line, comp;

    function init() {
        radar = new Chart(document.getElementById('c-radar').getContext('2d'), { type: 'radar', data: { labels: categorias.slice(1), datasets: [{ data: [], backgroundColor: 'rgba(99, 102, 241, 0.4)', borderColor: '#6366f1', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 25, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        line = new Chart(document.getElementById('c-line').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } } });
        comp = new Chart(document.getElementById('c-comp').getContext('2d'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#6366f1', borderRadius: 5 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { max: 100 } } } });
        renderList(); load(0);
    }

    function load(i) {
        if(gestores.length === 0) return;
        atual = i; const g = gestores[i];
        document.getElementById('h-name').innerText = g.n;
        document.getElementById('h-role').innerText = g.r;
        document.getElementById('obs-area').value = g.obs || "";
        
        const ins = document.getElementById('inputs'); ins.innerHTML = '';
        categorias.forEach((c, j) => {
            const isTotal = j === 0;
            ins.innerHTML += `<div class="row ${isTotal?'total-row':''}">
                <label>${c}</label>
                <input type="number" value="${g.v[j]}" ${isTotal?'readonly':''} id="inp-${j}" oninput="upd(${j}, this.value)">
            </div>`;
        });
        refresh(); renderList();
    }

    // AQUI ESTÁ A SOMA AUTOMÁTICA DOS TÓPICOS
    function upd(j, v) {
        let val = Math.min(parseFloat(v) || 0, 25);
        gestores[atual].v[j] = val;
        
        // RESULTADOS (v[0]) = Soma de v[1] + v[2] + v[3] + v[4]
        gestores[atual].v[0] = gestores[atual].v.slice(1).reduce((a, b) => a + b, 0);
        
        // Atualiza visualmente o campo de Resultados no editor
        document.getElementById('inp-0').value = gestores[atual].v[0].toFixed(1);
        
        save(); refresh();
    }

    function refresh() {
        const g = gestores[atual];
        const badge = document.getElementById('badge-total');
        badge.innerText = `PONTUAÇÃO: ${g.v[0].toFixed(1)} / 100`;
        badge.style.background = g.v[0] >= 90 ? "var(--success)" : (g.v[0] >= 75 ? "var(--gold)" : "var(--primary)");

        radar.data.datasets[0].data = g.v.slice(1); radar.update();
        line.data.labels = (g.history || []).map((h) => h.data);
        line.data.datasets[0].data = (g.history || []).map((h) => h.nota); line.update();
        comp.data.labels = gestores.map(x => x.n);
        comp.data.datasets[0].data = gestores.map(x => x.v[0]); comp.update();
    }

    function salvarNoHistorico() {
        const g = gestores[atual];
        const agora = new Date();
        const dataFormatada = agora.toLocaleDateString('pt-BR') + " " + agora.getHours() + ":" + agora.getMinutes();
        if(!g.history) g.history = [];
        g.history.push({ data: dataFormatada, nota: g.v[0] });
        save(); refresh();
        alert("Avaliação arquivada no histórico!");
    }

    function abrirAbaHistorico() {
        const g = gestores[atual];
        document.getElementById('hist-title').innerText = `📜 Histórico: ${g.n}`;
        const content = document.getElementById('hist-content');
        content.innerHTML = (g.history || []).length > 0 ? "" : "<p>Nenhum registro encontrado.</p>";
        (g.history || []).slice().reverse().forEach((h, idx) => {
            content.innerHTML += `<div class="hist-item"><span>📅 ${h.data}</span><span style="color:var(--primary)">Nota: ${h.nota.toFixed(1)}</span></div>`;
        });
        document.getElementById('modal-history').style.display = 'block';
        document.querySelector('.overlay').style.display = 'block';
    }

    function abrirSalario() {
        const list = document.getElementById('salary-list'); list.innerHTML = '';
        gestores.forEach(g => {
            list.innerHTML += `<div class="hist-item"><span>${g.n}</span><span>R$ ${g.s.toLocaleString()}</span><span style="color:var(--success)">Bônus: R$ ${(g.s*0.4).toLocaleString()}</span></div>`;
        });
        document.getElementById('modal-salary').style.display = 'block';
        document.querySelector('.overlay').style.display = 'block';
    }

    function fecharModais() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.querySelector('.overlay').style.display = 'none';
    }

    function addGestor() {
        const n = document.getElementById('new-name').value.toUpperCase();
        const r = document.getElementById('new-role').value.toUpperCase();
        const s = parseFloat(document.getElementById('new-salary').value) || 0;
        if(!n || !r) return alert("Preencha Nome e Cargo!");
        gestores.push({ n, r, v: [0, 0, 0, 0, 0], s, obs: "", history: [] });
        save(); renderList(); load(gestores.length - 1);
        document.getElementById('new-name').value=''; document.getElementById('new-role').value='';
    }

    function renderList() {
        const list = document.getElementById('list'); list.innerHTML = '';
        gestores.forEach((g, i) => {
            list.innerHTML += `<div class="item ${i === atual ? 'active' : ''}" onclick="load(${i})">
                <b>${g.n}</b><span onclick="excluirGestor(${i}, event)" style="color:var(--danger)">✕</span>
            </div>`;
        });
    }

    function excluirGestor(index, e) {
        e.stopPropagation();
        if(confirm(`Excluir ${gestores[index].n}?`)) {
            gestores.splice(index, 1); save(); renderList(); if(gestores.length > 0) load(0);
        }
    }

    function gerarPDF() {
        const actions = document.querySelector('.actions');
        actions.style.visibility = 'hidden';
        const opt = { margin: 0, filename: `SACRES_V7_${gestores[atual].n}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'px', format: [1050, 800], orientation: 'landscape' } };
        html2pdf().from(document.getElementById('print-container')).set(opt).save().then(() => { actions.style.visibility = 'visible'; });
    }

    function salvarObs() { gestores[atual].obs = document.getElementById('obs-area').value; save(); }
    function save() { localStorage.setItem('sacres_v7_data', JSON.stringify(gestores)); }

    window.onload = init;
</script>
</body>
</html>
