<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACRES - Gestão Estratégica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg-sidebar: #1e293b; --primary: #3b82f6; --accent: #7c3aed; 
            --success: #10b981; --gold: #f59e0b; --danger: #ef4444; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f8fafc; min-height: 100vh; }
        .wrapper { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--bg-sidebar); color: white; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .list-area { flex-grow: 1; overflow-y: auto; margin: 15px 0; max-height: 250px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .item { padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: space-between; }
        .item.active { background: var(--primary); font-weight: bold; }
        .btn-del { color: #ff9999; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 14px; }

        .add-area { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .add-area input { width: 100%; padding: 6px; margin-bottom: 5px; border-radius: 4px; border: none; font-size: 11px; font-weight: bold; }
        .btn-add { width: 100%; background: var(--success); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 10px; }

        .editor { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .row label { font-size: 9px; color: #cbd5e1; font-weight: 900; }
        .row input { width: 65px; text-align: center; border-radius: 6px; border: none; padding: 6px; font-weight: 900; background: #334155; color: white; }

        /* MAIN CONTENT */
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #f8fafc; }
        .header { background: white; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .badge-total { padding: 12px 25px; border-radius: 10px; color: white; font-weight: 900; font-size: 18px; }
        
        .actions { display: flex; gap: 10px; }
        .btn-pdf { background: #be123c; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 900; }
        .btn-money { background: #15803d; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 900; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; }
        .card h4 { font-weight: 900; font-size: 11px; color: #64748b; margin-bottom: 10px; text-transform: uppercase; }
        .full { grid-column: span 2; }
        .chart-box { height: 180px; width: 100%; } /* Altura reduzida para caber no A4 */

        #obs-area { width: 100%; height: 60px; border-radius: 8px; border: 1px solid #e2e8f0; padding: 10px; font-size: 12px; font-weight: 600; resize: none; margin-top: 10px; overflow: hidden; }

        /* SALARIO MODAL */
        #salary-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:20px; box-shadow:0 0 50px rgba(0,0,0,0.5); z-index:100; width: 500px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:99; }
        .salary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 13px; font-weight: bold;}

        /* FORÇAR TAMANHO DO PDF */
        #print-wrapper { width: 1050px; padding: 20px; background: #f8fafc; }
    </style>
</head>
<body>

<div class="overlay" onclick="fecharSalario()"></div>
<div id="salary-modal">
    <h2 style="margin-bottom: 20px; color: var(--bg-sidebar);">💰 Gestão Salarial (Bônus 40%)</h2>
    <div id="salary-list"></div>
    <button onclick="fecharSalario()" style="margin-top:20px; width:100%; padding:10px; background:var(--bg-sidebar); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:900;">FECHAR</button>
</div>

<div class="wrapper">
    <div class="sidebar">
        <h2 style="font-size: 24px; font-weight: 900; color: #60a5fa; margin-bottom: 20px;">SACRES</h2>
        <div class="add-area">
            <input type="text" id="new-name" placeholder="NOME DO FUNCIONÁRIO">
            <input type="text" id="new-role" placeholder="CARGO">
            <input type="number" id="new-salary" placeholder="SALÁRIO R$">
            <button class="btn-add" onclick="addGestor()">+ ADICIONAR AO SISTEMA</button>
        </div>
        <div id="list" class="list-area"></div>
        <div class="editor">
            <h4 style="color: #60a5fa; margin-bottom: 12px; font-size: 10px; font-weight: 900;">NOTAS TÉCNICAS</h4>
            <div id="inputs"></div>
        </div>
    </div>

    <div class="main" id="pdf-area">
        <div id="print-wrapper">
            <div class="header">
                <div>
                    <h2 id="h-name" style="font-weight: 900; font-size: 22px; color: #1e293b;">SELECIONE</h2>
                    <p id="h-role" style="font-weight: 800; color: var(--primary); text-transform: uppercase;">CARGO</p>
                </div>
                <div id="badge-total" class="badge-total">TOTAL: 0</div>
                <div class="actions">
                    <button class="btn-money" onclick="abrirSalario()">💰 SALÁRIOS</button>
                    <button class="btn-pdf" onclick="gerarPDF()">📄 GERAR PDF 1 PÁGINA</button>
                </div>
            </div>

            <div class="grid" style="margin-top: 20px;">
                <div class="card"><h4>📊 EQUILÍBRIO</h4><div class="chart-box"><canvas id="c-radar"></canvas></div></div>
                <div class="card"><h4>📈 DISTRIBUIÇÃO</h4><div class="chart-box"><canvas id="c-pie"></canvas></div></div>
                <div class="card full">
                    <h4 style="color: var(--primary); font-weight: 900;">📊 COMPARATIVO DE PERFORMANCE</h4>
                    <div class="chart-box" style="height: 140px;"><canvas id="c-comp"></canvas></div>
                    <textarea id="obs-area" placeholder="Observações..." oninput="salvarObs()"></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const categorias = ['RESULTADOS', 'GESTÃO PESSOAS', 'COMPROMETIMENTO', 'CONTRIBUIÇÃO', 'CULTURA'];
    let atual = 0;
    let gestores = JSON.parse(localStorage.getItem('sacres_data')) || [
        { n: 'FABIO HENRIQUE', r: 'GERENTE', v: [100, 25, 25, 25, 25], s: 0, obs: "" }
    ];

    let radar, pie, compChart;

    function init() {
        const opt = { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } } };
        radar = new Chart(document.getElementById('c-radar'), { type: 'radar', data: { labels: categorias.slice(1), datasets: [{ data: [], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', borderWidth: 3 }] }, options: { ...opt, scales: { r: { min: 0, max: 25, pointLabels: { font: { weight: 'bold' } } } } } });
        pie = new Chart(document.getElementById('c-pie'), { type: 'doughnut', data: { labels: categorias.slice(1), datasets: [{ data: [], backgroundColor: ['#10b981', '#f59e0b', '#8b5cf6', '#ec4899'] }] }, options: { ...opt, plugins: { legend: { display: true, position: 'bottom' } } } });
        compChart = new Chart(document.getElementById('c-comp'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#3b82f6', borderRadius: 5 }] }, options: { ...opt, indexAxis: 'y', scales: { x: { min: 0, max: 100 } } } });
        renderList(); load(0);
    }

    function addGestor() {
        const n = document.getElementById('new-name').value.toUpperCase();
        const r = document.getElementById('new-role').value.toUpperCase();
        const s = parseFloat(document.getElementById('new-salary').value) || 0;
        if(!n || !r) return alert("Preencha Nome e Cargo!");
        gestores.push({ n, r, v: [0, 0, 0, 0, 0], s, obs: "" });
        save(); renderList(); load(gestores.length - 1);
    }

    function excluirGestor(index, e) {
        e.stopPropagation();
        if(confirm(`Excluir ${gestores[index].n}?`)) {
            gestores.splice(index, 1);
            save(); renderList(); load(0);
        }
    }

    function renderList() {
        const list = document.getElementById('list'); list.innerHTML = '';
        gestores.forEach((g, i) => {
            const d = document.createElement('div');
            d.className = `item ${i === atual ? 'active' : ''}`;
            d.innerHTML = `<strong>${g.n}</strong> <span onclick="excluirGestor(${i}, event)">✕</span>`;
            d.onclick = () => load(i);
            list.appendChild(d);
        });
    }

    function load(i) {
        if(gestores.length === 0) return;
        atual = i; const g = gestores[i];
        document.getElementById('h-name').innerText = g.n;
        document.getElementById('h-role').innerText = g.r;
        document.getElementById('obs-area').value = g.obs || "";
        const ins = document.getElementById('inputs'); ins.innerHTML = '';
        categorias.forEach((c, j) => {
            ins.innerHTML += `<div class="row"><label>${c}</label><input type="number" value="${g.v[j]}" ${j==0?'readonly':''} oninput="upd(${j}, this.value)"></div>`;
        });
        refresh();
    }

    function upd(j, v) { 
        let val = Math.min(parseFloat(v) || 0, 25);
        gestores[atual].v[j] = val; 
        gestores[atual].v[0] = gestores[atual].v.slice(1).reduce((a, b) => a + b, 0);
        save(); refresh(); 
    }

    function salvarObs() { gestores[atual].obs = document.getElementById('obs-area').value; save(); }
    function save() { localStorage.setItem('sacres_data', JSON.stringify(gestores)); }

    function refresh() {
        const g = gestores[atual];
        document.getElementById('badge-total').style.backgroundColor = g.v[0] >= 100 ? "var(--success)" : (g.v[0] >= 80 ? "var(--gold)" : "var(--primary)");
        document.getElementById('badge-total').innerText = `TOTAL: ${g.v[0].toFixed(1)}`;
        radar.data.datasets[0].data = g.v.slice(1); radar.update();
        pie.data.datasets[0].data = g.v.slice(1); pie.update();
        compChart.data.labels = gestores.map(x => x.n);
        compChart.data.datasets[0].data = gestores.map(x => x.v[0]);
        compChart.update();
    }

    function abrirSalario() {
        document.getElementById('salary-modal').style.display = 'block';
        document.querySelector('.overlay').style.display = 'block';
        const list = document.getElementById('salary-list'); list.innerHTML = '';
        gestores.forEach(g => {
            list.innerHTML += `<div class="salary-row"><span>${g.n}</span><span>R$ ${g.s.toLocaleString()}</span><span style="color:var(--success)">40%: R$ ${(g.s * 0.4).toLocaleString()}</span></div>`;
        });
    }
    function fecharSalario() { 
        document.getElementById('salary-modal').style.display = 'none';
        document.querySelector('.overlay').style.display = 'none';
    }

    // PDF MATADOR - PÁGINA ÚNICA GARANTIDA
    function gerarPDF() {
        const element = document.getElementById('print-wrapper');
        const actions = document.querySelector('.actions');
        
        // Esconder os botões para não sair no papel
        actions.style.display = 'none';

        const opt = {
            margin: 0,
            filename: `SACRES_${gestores[atual].n}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { 
                scale: 2, 
                useCORS: true, 
                width: 1050, // Forçamos a largura do container
                height: 750  // Forçamos a altura para caber no A4 Paisagem
            },
            jsPDF: { unit: 'px', format: [1050, 750], orientation: 'landscape' }
        };

        html2pdf().from(element).set(opt).save().then(() => {
            actions.style.display = 'flex'; // Volta os botões na tela
        });
    }

    window.onload = init;
</script>
</body>
</html>
