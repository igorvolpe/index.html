<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">STRATOS Analytics - Performance Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg-body: #f1f5f9; --sidebar: #0f172a; --primary: #6366f1; 
            --secondary: #a855f7; --success: #22c55e; --gold: #eab308; 
            --danger: #f43f5e; --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: #1e293b; overflow-x: hidden; }
        .wrapper { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 310px; background: var(--sidebar); color: white; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        #sys-name-display { font-size: 22px; font-weight: 900; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
        
        .config-area { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.3); }
        .config-area label { font-size: 9px; font-weight: 800; color: #818cf8; display: block; margin-bottom: 5px; }

        .add-area { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .add-area input, .config-area input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: none; background: #1e293b; color: white; font-size: 11px; font-weight: bold; }
        .btn-add { width: 100%; background: linear-gradient(135deg, var(--success), #16a34a); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 11px; }

        .list-area { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; max-height: 150px; }
        .item { padding: 10px; background: rgba(255,255,255,0.03); margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; font-size: 11px; }
        .item.active { background: rgba(99, 102, 241, 0.2); border-color: var(--primary); }

        .editor { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .row label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .row input { width: 60px; padding: 5px; border-radius: 6px; border: none; background: #334155; color: white; text-align: center; font-weight: 900; }
        .row.total-row input { background: var(--primary); color: white; }

        /* MAIN */
        .main { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #print-container { width: 1050px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-body); padding: 10px; }

        .header { background: var(--card-bg); padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .badge-total { padding: 10px 20px; border-radius: 12px; color: white; font-weight: 900; font-size: 18px; }
        
        .actions { display: flex; gap: 6px; }
        .btn-action { padding: 8px 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; color: white; font-size: 10px; display: flex; align-items: center; gap: 5px; }
        .btn-save { background: var(--primary); }
        .btn-hist { background: var(--secondary); }
        .btn-raiox { background: #334155; }
        .btn-pdf { background: var(--danger); }

        .grid-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 12px; border: 1px solid #e2e8f0; }
        .card h4 { font-size: 9px; font-weight: 900; color: #64748b; margin-bottom: 8px; text-transform: uppercase; text-align: center; }
        
        .chart-container { height: 260px; position: relative; width: 100%; }
        .chart-container.large { height: 220px; }

        #ai-feedback { margin-top: 5px; padding: 8px; background: #f0fdf4; border-left: 4px solid var(--success); border-radius: 4px; font-size: 10px; font-weight: 700; color: #166534; }
        #obs-area { width: 100%; height: 50px; margin-top: 5px; padding: 8px; border-radius: 10px; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 600; resize: none; font-size: 11px; }

        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.85); z-index:99; }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:20px; z-index:100; width: 600px; }
    </style>
</head>
<body>

<div class="overlay" onclick="fecharModais()"></div>

<div id="modal-raiox" class="modal">
    <h2 style="margin-bottom: 10px; font-weight: 900;">📊 Raio-X Equipe</h2>
    <div id="raiox-content"></div>
    <button onclick="fecharModais()" style="margin-top:20px; width:100%; padding:12px; background:var(--sidebar); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:900;">FECHAR</button>
</div>

<div class="wrapper">
    <aside class="sidebar">
        <h2 id="sys-name-display">STRATOS Analytics</h2>
        
        <div class="config-area">
            <label>IDENTIDADE DO SISTEMA</label>
            <input type="text" id="sys-name-input" value="STRATOS Analytics" oninput="updateSysName(this.value)">
        </div>

        <div class="add-area">
            <input type="text" id="new-name" placeholder="NOME DO COLABORADOR">
            <input type="text" id="new-role" placeholder="CARGO">
            <input type="number" id="new-salary" placeholder="SALÁRIO R$">
            <button class="btn-add" onclick="addGestor()">+ ADICIONAR GESTOR</button>
        </div>
        <div id="list" class="list-area"></div>
        <div class="editor">
            <h4 style="color: #818cf8; font-size: 9px; margin-bottom: 10px; font-weight: 900;">NOTAS TÉCNICAS</h4>
            <div id="inputs"></div>
        </div>
    </aside>

    <main class="main">
        <div id="print-container">
            <div class="header">
                <div>
                    <h2 id="h-name" style="font-size: 20px; font-weight: 900;">Selecione</h2>
                    <p id="h-role" style="font-weight: 700; color: var(--primary); font-size: 11px; text-transform: uppercase;"></p>
                </div>
                <div id="badge-total" class="badge-total" style="background: var(--primary)">0.0</div>
                <div class="actions">
                    <button class="btn-action btn-raiox" onclick="abrirRaioX()">📊 RAIO-X</button>
                    <button class="btn-action btn-save" onclick="salvarNoHistorico()">📌 SALVAR MÊS</button>
                    <button class="btn-action btn-pdf" onclick="gerarPDF()">📄 PDF</button>
                </div>
            </div>

            <div class="grid-top">
                <div class="card"><h4>📊 EQUILÍBRIO ATUAL</h4><div class="chart-container"><canvas id="c-radar"></canvas></div></div>
                <div class="card"><h4>📈 DISTRIBUIÇÃO TÉCNICA</h4><div class="chart-container"><canvas id="c-pie"></canvas></div></div>
                <div class="card"><h4>📅 EVOLUÇÃO (META: 85)</h4><div class="chart-container"><canvas id="c-line"></canvas></div></div>
            </div>

            <div class="card full" style="width:100%;">
                <h4>📊 RANKING DE PERFORMANCE DA EQUIPE</h4>
                <div class="chart-container large"><canvas id="c-comp"></canvas></div>
                <div id="ai-feedback">Análise estratégica...</div>
                <textarea id="obs-area" placeholder="Notas de feedback..." oninput="salvarObs()"></textarea>
            </div>
        </div>
    </main>
</div>

<script>
    const categorias = ['RESULTADOS', 'GESTÃO PESSOAS', 'COMPROMETIMENTO', 'CONTRIBUIÇÃO', 'CULTURA'];
    const mesesLabels = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    let atual = 0;
    let gestores = JSON.parse(localStorage.getItem('stratos_data_v1')) || [];
    let radar, pie, line, comp;

    function updateSysName(val) {
        const name = val || "SISTEMA";
        document.getElementById('sys-name-display').innerText = name;
        document.getElementById('page-title').innerText = name + " - Performance Hub";
    }

    function init() {
        radar = new Chart(document.getElementById('c-radar').getContext('2d'), { type: 'radar', data: { labels: categorias.slice(1), datasets: [{ data: [], backgroundColor: 'rgba(99, 102, 241, 0.4)', borderColor: '#6366f1', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 25, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        pie = new Chart(document.getElementById('c-pie').getContext('2d'), { type: 'doughnut', data: { labels: categorias.slice(1), datasets: [{ data: [], backgroundColor: ['#6366f1', '#a855f7', '#f43f5e', '#fbbf24'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } } } });
        line = new Chart(document.getElementById('c-line').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', fill: true, tension: 0.4 }, { label: 'Meta', data: Array(12).fill(85), borderColor: 'rgba(244, 63, 94, 0.4)', borderDash: [5, 5], pointRadius: 0, fill: false }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } } });
        comp = new Chart(document.getElementById('c-comp').getContext('2d'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#6366f1', borderRadius: 5 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { max: 100 } } } });
        renderList(); if(gestores.length > 0) load(0);
    }

    function addGestor() {
        const n = document.getElementById('new-name').value.toUpperCase();
        const r = document.getElementById('new-role').value.toUpperCase();
        const s = parseFloat(document.getElementById('new-salary').value) || 0;
        if(!n || !r) return;
        const novo = { n, r, s, v: [0, 0, 0, 0, 0], obs: "", history: [] };
        gestores.push(novo); save(); renderList(); load(gestores.length - 1);
        document.getElementById('new-name').value = ''; document.getElementById('new-role').value = ''; document.getElementById('new-salary').value = '';
    }

    function load(i) {
        atual = i; const g = gestores[i];
        document.getElementById('h-name').innerText = g.n;
        document.getElementById('h-role').innerText = g.r;
        document.getElementById('obs-area').value = g.obs || "";
        const ins = document.getElementById('inputs'); ins.innerHTML = '';
        categorias.forEach((c, j) => {
            const isTotal = j === 0;
            ins.innerHTML += `<div class="row ${isTotal?'total-row':''}">
                <label>${c}</label>
                <input type="number" value="${g.v[j]}" ${isTotal?'readonly':''} id="inp-${j}" oninput="upd(${j}, this.value)">
            </div>`;
        });
        refresh(); renderList();
    }

    function upd(j, v) {
        let val = Math.min(parseFloat(v) || 0, 25);
        gestores[atual].v[j] = val;
        gestores[atual].v[0] = gestores[atual].v.slice(1).reduce((a, b) => a + b, 0);
        document.getElementById('inp-0').value = gestores[atual].v[0].toFixed(1);
        save(); refresh();
    }

    function refresh() {
        if(gestores.length === 0) return;
        const g = gestores[atual];
        document.getElementById('badge-total').innerText = g.v[0].toFixed(1);
        document.getElementById('badge-total').style.background = g.v[0] >= 85 ? "var(--success)" : (g.v[0] >= 70 ? "var(--gold)" : "var(--danger)");
        radar.data.datasets[0].data = g.v.slice(1); radar.update();
        pie.data.datasets[0].data = g.v.slice(1); pie.update();
        line.data.labels = (g.history || []).map(h => h.mes);
        line.data.datasets[0].data = (g.history || []).map(h => h.nota); line.update();
        comp.data.labels = gestores.map(x => x.n);
        comp.data.datasets[0].data = gestores.map(x => x.v[0]); comp.update();
        const piorIdx = g.v.slice(1).indexOf(Math.min(...g.v.slice(1))) + 1;
        document.getElementById('ai-feedback').innerHTML = `💡 <b>Estratégia Recomendada:</b> Focar no desenvolvimento em <u>${categorias[piorIdx]}</u>.`;
    }

    function save() { localStorage.setItem('stratos_data_v1', JSON.stringify(gestores)); }
    function renderList() { document.getElementById('list').innerHTML = gestores.map((g, i) => `<div class="item ${i === atual ? 'active' : ''}" onclick="load(${i})"><b>${g.n}</b><span onclick="excluirGestor(${i}, event)" style="color:var(--danger); cursor:pointer">✕</span></div>`).join(''); }
    function excluirGestor(i, e) { e.stopPropagation(); if(confirm("Remover?")) { gestores.splice(i, 1); save(); renderList(); if(gestores.length>0) load(0); else location.reload(); } }
    function salvarObs() { gestores[atual].obs = document.getElementById('obs-area').value; save(); }
    function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.querySelector('.overlay').style.display = 'none'; }
    function salvarNoHistorico() { const g = gestores[atual]; const mes = mesesLabels[new Date().getMonth()]; if(!g.history) g.history = []; g.history.push({ mes: mes, nota: g.v[0] }); save(); refresh(); alert("Mês registrado no histórico!"); }
    function abrirRaioX() { if(gestores.length < 1) return; const total = gestores.reduce((a,b) => a+b.v[0], 0) / gestores.length; document.getElementById('raiox-content').innerHTML = `<div style="padding:20px; text-align:center; background:#f8fafc; border-radius:15px"><h5>MÉDIA GLOBAL DA EQUIPE</h5><h2 style="color:var(--primary)">${total.toFixed(1)}</h2></div>`; document.getElementById('modal-raiox').style.display='block'; document.querySelector('.overlay').style.display='block'; }
    function gerarPDF() { const actions = document.querySelector('.actions'); const sysName = document.getElementById('sys-name-input').value; actions.style.visibility = 'hidden'; html2pdf().from(document.getElementById('print-container')).set({ margin: 0, filename: `${sysName}_Analise.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'px', format: [1050, 850], orientation: 'landscape' } }).save().then(() => { actions.style.visibility = 'visible'; }); }

    window.onload = init;
</script>
</body>
</html>
