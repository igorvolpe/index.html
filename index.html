<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Dashboard - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f4f7f6; }
        .wrapper { display: flex; width: 100vw; height: 100vh; }

        /* LADO ESQUERDO */
        .sidebar { width: 300px; background: #1e293b; color: white; padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .search-box { padding: 10px; margin-bottom: 10px; border-radius: 4px; border: none; width: 100%; }
        .list-area { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; }
        .item { padding: 10px; background: #334155; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .item:hover { background: #475569; }
        .item.active { background: #3b82f6; font-weight: bold; }
        
        /* PAINEL DE NOTAS */
        .editor { background: #0f172a; padding: 12px; border-radius: 6px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .row label { font-size: 11px; color: #94a3b8; }
        .row input { width: 50px; text-align: center; border-radius: 3px; border: none; font-weight: bold; padding: 2px; }

        /* LADO DIREITO */
        .main { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .header { background: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .badge { background: #22c55e; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        .card { background: white; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
