<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard RH - Resolução Perfeita</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS PARA FORÇAR TUDO A CABER NA TELA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        html, body { 
            width: 100%; height: 100%; 
            overflow: hidden; /* Proíbe barras de rolagem */
            background-color: #f1f5f9;
        }

        .container { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
        }

        /* BARRA LATERAL */
        .sidebar { 
            width: 240px; background: #0f172a; color: white; 
            display: flex; flex-direction: column; padding: 15px; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 13px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; }
        
        .search-box {
            padding: 8px; border-radius: 4px; border: none; margin-bottom: 15px;
            width: 100%; font-size: 12px; background: #1e293b; color: white;
        }

        .employee-list { 
            flex-grow: 1; overflow-y: auto; font-size: 11px;
        }
        .employee-item { 
            padding: 6px; border-bottom: 1px solid #1e293b; cursor: pointer;
            display: flex; justify-content: space-between;
        }
        .employee-item:hover { background: #334155; }

        /* ÁREA DOS GRÁFICOS */
        .main { 
            flex-grow: 1; padding: 10px; 
            display: flex; flex-direction: column; gap: 10px;
        }

        .header { height: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; color: #1e293b; }

        /* GRID QUE CONTROLA O TAMANHO DOS GRÁFICOS */
        .charts-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            height: calc(100% - 40px); /* Garante que os gráficos usem o resto da tela */
        }

        .chart-card { 
            background: white; border-radius: 8px; padding: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            max-height: 100%; /* Impede de crescer além da grid */
        }
        
        .chart-card h3 { font-size: 11px; margin-bottom: 5px; color: #64748b; }
        
        /* CONTAINER DO CANVAS COM TAMANHO FIXO */
        .canvas-container { 
            flex-grow: 1; 
            position: relative; 
            height: 100%; 
            width: 100%; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>👥 Colaboradores</h2>
        <input type="text" id="search" class="search-box" placeholder="🔎 Pesquisar..." onkeyup="filtrar()">
        <div class="employee-list" id="lista"></div>
    </div>

    <div class="main">
        <div class="header">
            <h1>Desempenho RH 2025</h1>
            <span id="data" style="font-size: 11px; color: #64748b;"></span>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>Análise de Competências (Radar)</h3>
                <div class="canvas-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Ranking Geral</h3>
                <div class="canvas-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const nomes = ['Alana', 'Alexandro', 'Aline', 'Ana Paula', 'Andreza', 'Beatriz', 'Caio', 'Daniela', 'Eduardo', 'Fernanda'];
    const dados = nomes.map(n => ({ nome: n, nota: (Math.random() * 3 + 7).toFixed(1) }));

    function filtrar() {
        const termo = document.getElementById('search').value.toLowerCase();
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        dados.filter(f => f.nome.toLowerCase().includes(termo)).forEach(f => {
            lista.innerHTML += `<div class="employee-item"><span>${f.nome}</span><strong>${f.nota}</strong></div>`;
        });
    }

    const options = {
        responsive: true,
        maintainAspectRatio: false, // ISTO FORÇA O GRÁFICO A CABER NA CAIXA
        plugins: { legend: { display: false } },
        scales: {
            r: { 
                ticks: { display: false },
                pointLabels: { font: { size: 9 } } 
            },
            x: { ticks: { font: { size: 9 } } },
            y: { ticks: { font: { size: 9 } } }
        }
    };

    // Radar
    new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: ['Liderança', 'Técnica', 'Foco', 'Equipe', 'Entrega'],
            datasets: [{
                data: [8, 7, 9, 8, 7],
                backgroundColor: 'rgba(59, 130, 246, 0.2)',
                borderColor: '#3b82f6',
                borderWidth: 1.5,
                pointRadius: 2
            }]
        },
        options: options
    });

    // Barras
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: nomes,
            datasets: [{
                data: dados.map(d => d.nota),
                backgroundColor: '#3b82f6',
                borderRadius: 3
            }]
        },
        options: options
    });

    filtrar();
    document.getElementById('data').innerText = new Date().toLocaleDateString();
</script>
</body>
</html>
