<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard RH - Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; color: #f8fafc; }

        .app { display: flex; width: 100vw; height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #1e293b; display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #334155; }
        .sidebar h2 { font-size: 12px; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px; }
        .search-box { padding: 10px; border-radius: 6px; border: none; background: #334155; color: white; margin-bottom: 15px; width: 100%; outline: none; border: 1px solid transparent; }
        .search-box:focus { border-color: #3b82f6; }

        .emp-list { flex-grow: 1; overflow-y: auto; }
        .emp-card { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; border: 1px solid transparent; }
        .emp-card:hover { background: #334155; }
        .emp-card.active { background: #3b82f6; color: white; }
        .emp-card strong { display: block; font-size: 13px; }
        .emp-card span { font-size: 10px; color: #cbd5e1; }
        .emp-card.active span { color: #dbeafe; }

        /* MAIN DASHBOARD */
        .main { flex-grow: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f1f5f9; color: #1e293b; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .header h1 { font-size: 18px; }

        /* GRID DE GRÁFICOS - 3 ESPAÇOS */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; flex-grow: 1; min-height: 0; }
        .chart-box { background: white; border-radius: 10px; padding: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .chart-box.full-width { grid-column: span 2; } /* O gráfico de competências fica largo embaixo */
        .chart-box h3 { font-size: 12px; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        
        .canvas-container { flex-grow: 1; position: relative; min-height: 0; }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <h2>Pesquisar Gestor</h2>
        <input type="text" id="search" class="search-box" placeholder="Nome ou cargo..." onkeyup="filterList()">
        <div class="emp-list" id="empList"></div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h1 id="selectedName">Selecione um Funcionário</h1>
                <p id="selectedRole" style="font-size: 12px; color: #64748b;">Aguardando seleção...</p>
            </div>
            <div style="text-align: right; font-size: 11px; font-weight: bold;">RH DESEMPENHO 2025</div>
        </div>

        <div class="charts-grid">
            <div class="chart-box">
                <h3>Equilíbrio de Competências</h3>
                <div class="canvas-container"><canvas id="radarChart"></canvas></div>
            </div>

            <div class="chart-box">
                <h3>Nota Final vs Meta</h3>
                <div class="canvas-container"><canvas id="barMetaChart"></canvas></div>
            </div>

            <div class="chart-box full-width">
                <h3>Detalhamento por Competência (Avaliação 2025)</h3>
                <div class="canvas-container"><canvas id="detailChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    // DADOS REAIS CONFORME SOLICITADO
    const data = [
        { nome: 'Fabio Henrique Bethiol', cargo: 'GERENTE A.FINANCEIRO', notas: [8.5, 9, 7.5, 8.8, 9.2], final: 8.6 },
        { nome: 'Iolanda Rocha Volpe', cargo: 'COORD DP & RH', notas: [9.5, 8.5, 9.2, 9.8, 9.0], final: 9.2 },
        { nome: 'João Aparecido Santos', cargo: 'GERENTE SEGURANÇA', notas: [7.8, 8.2, 8.5, 7.0, 8.0], final: 7.9 },
        { nome: 'Ricardo Cecconi Jr', cargo: 'GERENTE GERAL', notas: [9.0, 9.2, 9.5, 9.0, 9.8], final: 9.3 },
        { nome: 'Rodrigo Donizete Costa', cargo: 'GERENTE MANUT & ENGENHARIA', notas: [8.2, 7.8, 8.0, 8.5, 7.5], final: 8.0 }
    ];

    const labelsComp = ['Comunicação', 'Proatividade', 'Liderança', 'Equipe', 'Resultados'];
    let radar, barMeta, detail;

    function initCharts() {
        const commonOpt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

        radar = new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: { labels: labelsComp, datasets: [{ data: [0,0,0,0,0], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6' }] },
            options: commonOpt
        });

        barMeta = new Chart(document.getElementById('barMetaChart'), {
            type: 'bar',
            data: { labels: ['Nota Final', 'Meta'], datasets: [{ data: [0, 9], backgroundColor: ['#3b82f6', '#e2e8f0'] }] },
            options: commonOpt
        });

        detail = new Chart(document.getElementById('detailChart'), {
            type: 'bar',
            data: { 
                labels: labelsComp, 
                datasets: [{ data: [0,0,0,0,0], backgroundColor: '#10b981', borderRadius: 5 }] 
            },
            options: { ...commonOpt, indexAxis: 'y' } // Barras horizontais como na foto
        });
    }

    function updateDash(index) {
        const emp = data[index];
        document.getElementById('selectedName').innerText = emp.nome;
        document.getElementById('selectedRole').innerText = emp.cargo;

        // Atualizar Radar
        radar.data.datasets[0].data = emp.notas;
        radar.update();

        // Atualizar Barra Meta
        barMeta.data.datasets[0].data = [emp.final, 9];
        barMeta.update();

        // Atualizar Detalhe (Gráfico da Foto)
        detail.data.datasets[0].data = emp.notas;
        detail.update();

        // Marcar ativo na lista
        document.querySelectorAll('.emp-card').forEach((c, i) => {
            c.classList.toggle('active', i === index);
        });
    }

    function filterList() {
        const term = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('empList');
        list.innerHTML = '';
        data.forEach((emp, i) => {
            if (emp.nome.toLowerCase().includes(term) || emp.cargo.toLowerCase().includes(term)) {
                const card = document.createElement('div');
                card.className = 'emp-card';
                card.onclick = () => updateDash(i);
                card.innerHTML = `<strong>${emp.nome}</strong><span>${emp.cargo}</span>`;
                list.appendChild(card);
            }
        });
    }

    initCharts();
    filterList();
    updateDash(0); // Começa com o primeiro da lista
</script>
</body>
</html>
